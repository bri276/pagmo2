name: Windows CI
on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  windows-no-deps:
    name: Windows - No Optional Dependencies
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Install vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
        shell: powershell
      - name: Install base dependencies
        run: |
          .\vcpkg\vcpkg.exe install boost:x64-windows openblas:x64-windows
        shell: powershell
      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -T v143 `
                   -DCMAKE_BUILD_TYPE=Release `
                   -DCMAKE_TOOLCHAIN_FILE=..\vcpkg\scripts\buildsystems\vcpkg.cmake `
                   -DPAGMO_BUILD_TESTS=ON `
                   -DPAGMO_WITH_EIGEN3=OFF `
                   -DPAGMO_WITH_NLOPT=OFF `
                   -DPAGMO_WITH_IPOPT=OFF
        shell: powershell
      - name: Build
        run: |
          cd build
          cmake --build . --config Release --parallel
        shell: powershell
      - name: Test
        run: |
          cd build
          ctest -VV --output-on-failure -j4 -C Release
        shell: powershell

